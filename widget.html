<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>53 Calendar Widget</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="widget.css" />
</head>
<body>
  <main class="widget-shell">
    <header class="widget-header">
      <div>
        <div class="eyebrow">53 Calendar</div>
        <h1 id="widgetTitle">今月のカレンダー</h1>
      </div>
      <div class="today-pill" id="todayPill"></div>
    </header>
    <div class="widget-weekdays" id="widgetWeekdays"></div>
    <div class="widget-grid" id="widgetGrid"></div>
  </main>
  <script src="widget.js"></script>
</body>
</html>
