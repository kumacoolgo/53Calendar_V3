server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:png)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
}
