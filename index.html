<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>53 Calendar</title>
  <meta name="description" content="収集ルールを自由に設定できる日本向けごみ収集カレンダー。PWA とホーム画面ウィジェット用データ出力に対応。" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="53 Calendar" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css?v=direct-canvas-pdf-7" />
</head>
<body>
  <main id="pdfArea">
    <header class="header">
      <div class="month-nav">
        <button class="btn-icon" id="prevMonth" aria-label="前の月">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="month-title" id="monthLabel"></div>
        <button class="btn-icon" id="nextMonth" aria-label="次の月">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <div class="header-actions">
        <button class="btn-icon btn-today" id="todayBtn" type="button">今日</button>
        <button class="btn-icon btn-print" id="printBtn" type="button" aria-label="PDF に出力" title="PDF に出力">
          <i class="fa-solid fa-print"></i>
        </button>
        <button class="btn-settings" id="openSettings" type="button" aria-label="設定">
          <i class="fa-solid fa-sliders"></i>
        </button>
      </div>
    </header>

    <div id="bannerContainer"></div>

    <section class="calendar-container" aria-label="今月のカレンダー">
      <div class="calendar-inner">
        <div class="weekdays">
          <div class="sun">日</div>
          <div>月</div>
          <div>火</div>
          <div>水</div>
          <div>木</div>
          <div>金</div>
          <div class="sat">土</div>
        </div>
        <div class="days-grid" id="calendarGrid"></div>
      </div>
    </section>
  </main>

  <section class="legend" id="legendContainer" aria-label="分類の凡例"></section>

  <div class="modal-overlay" id="printChoiceModal">
    <div class="modal-card modal-card-sm">
      <div class="modal-header">
        <div class="modal-title">PDF に出力</div>
        <button class="modal-close-btn" id="closePrintChoice" type="button" aria-label="閉じる">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="print-choice-actions">
          <button class="btn-save" id="printMonthBtn" type="button">今月</button>
          <button class="btn-save" id="printYearBtn" type="button">年間 12か月</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">収集内容</div>
        <button class="modal-close-btn" id="closeDetail" type="button" aria-label="閉じる">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="detail-date" id="detailDateStr"></div>
        <div class="detail-meta" id="detailMetaStr"></div>
        <div id="detailList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-save" id="okDetail" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">収集ルール設定</div>
        <button class="modal-close-btn" id="closeSettings" type="button" aria-label="閉じる">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <button class="btn-add-type" id="addCategory" type="button">
          <i class="fa-solid fa-plus"></i> 分類を追加
        </button>
        <div class="settings-list" id="settingsList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-reset" id="resetSettings" type="button">初期設定に戻す</button>
        <button class="btn-save" id="saveSettings" type="button">保存して閉じる</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js?v=direct-canvas-pdf-7" defer></script>
</body>
</html>
